name: PR-labs CI

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build and start all services
        run: docker compose up -d --build --wait

      - name: Smoke test — сервис A, CRUD tasks
        run: |
          # GET /tasks
          curl -sSf http://localhost:3000/tasks

          # POST /tasks → сохраняем id созданной задачи
          TASK_ID=$(curl -sSf -X POST http://localhost:3000/tasks \
            -H "Content-Type: application/json" \
            -d '{"title":"CI task","completed":false}' | grep -o '"id":[0-9]*' | grep -o '[0-9]*')
          echo "Created task id=$TASK_ID"

          # GET /tasks/:id
          curl -sSf "http://localhost:3000/tasks/$TASK_ID"

          # PUT /tasks/:id
          curl -sSf -X PUT "http://localhost:3000/tasks/$TASK_ID" \
            -H "Content-Type: application/json" \
            -d '{"title":"CI task updated","completed":true}'

          # DELETE /tasks/:id
          curl -sSf -X DELETE "http://localhost:3000/tasks/$TASK_ID"

      - name: Smoke test — сервис B, CRUD notes
        run: |
          # GET /notes
          curl -sSf http://localhost:4000/notes

          # POST /notes → сохраняем id
          NOTE_ID=$(curl -sSf -X POST http://localhost:4000/notes \
            -H "Content-Type: application/json" \
            -d '{"text":"CI note","important":false}' | grep -o '"id":[0-9]*' | grep -o '[0-9]*')
          echo "Created note id=$NOTE_ID"

          # PUT /notes/:id
          curl -sSf -X PUT "http://localhost:4000/notes/$NOTE_ID" \
            -H "Content-Type: application/json" \
            -d '{"text":"CI note updated","important":true}'

          # DELETE /notes/:id
          curl -sSf -X DELETE "http://localhost:4000/notes/$NOTE_ID"

      - name: Smoke test — взаимодействие B → A (proxy)
        run: |
          # GET /proxy/tasks
          curl -sSf http://localhost:4000/proxy/tasks

          # POST /proxy/tasks → получаем id
          TASK_ID=$(curl -sSf -X POST http://localhost:4000/proxy/tasks \
            -H "Content-Type: application/json" \
            -d '{"title":"CI proxy task","completed":false}' \
            | grep -o '"id":[0-9]*' | grep -o '[0-9]*')
          echo "Proxy created task id=$TASK_ID"

          # PUT /proxy/tasks/:id
          curl -sSf -X PUT "http://localhost:4000/proxy/tasks/$TASK_ID" \
            -H "Content-Type: application/json" \
            -d '{"title":"CI proxy task updated","completed":true}'

          # DELETE /proxy/tasks/:id
          curl -sSf -X DELETE "http://localhost:4000/proxy/tasks/$TASK_ID"

      - name: Smoke test — email (SMTP отправка + IMAP/POP3 проверка)
        run: |
          # Создаём задачу специально для email-теста
          EMAIL_TASK_ID=$(curl -sSf -X POST http://localhost:3000/tasks \
            -H "Content-Type: application/json" \
            -d '{"title":"CI email task","completed":false}' | grep -o '"id":[0-9]*' | grep -o '[0-9]*')
          echo "Email task id=$EMAIL_TASK_ID"

          # SMTP: отправляем письмо с данными задачи
          curl -sSf -X POST http://localhost:4000/email/send \
            -H "Content-Type: application/json" \
            -d "{\"taskId\":$EMAIL_TASK_ID,\"to\":\"to@localhost\"}"

          # IMAP: убеждаемся что count > 0
          IMAP_COUNT=$(curl -sSf http://localhost:4000/email/check-imap | grep -o '"count":[0-9]*' | grep -o '[0-9]*')
          echo "IMAP count=$IMAP_COUNT"
          [ "$IMAP_COUNT" -gt 0 ] || (echo "IMAP: no messages found" && exit 1)

          # POP3: убеждаемся что count > 0
          POP3_COUNT=$(curl -sSf http://localhost:4000/email/check-pop3 | grep -o '"count":[0-9]*' | grep -o '[0-9]*')
          echo "POP3 count=$POP3_COUNT"
          [ "$POP3_COUNT" -gt 0 ] || (echo "POP3: no messages found" && exit 1)

      - name: Smoke test — WebSocket (real-time events)
        run: |
          # Устанавливаем ws во временную директорию
          mkdir -p /tmp/ws-test && cd /tmp/ws-test && npm install ws --silent

          node - <<'EOF'
          const WebSocket = require('/tmp/ws-test/node_modules/ws');
          const http = require('http');

          const ws = new WebSocket('ws://localhost:3000');

          ws.on('error', (e) => { console.error('WS error:', e.message); process.exit(1); });

          ws.on('open', () => {
            console.log('[WS] connected');
            const body = JSON.stringify({ title: 'WS smoke task', completed: false });
            const req = http.request(
              { hostname: 'localhost', port: 3000, path: '/tasks', method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(body) } },
              (res) => { res.resume(); }
            );
            req.write(body);
            req.end();
          });

          ws.on('message', (raw) => {
            const { event, payload } = JSON.parse(raw);
            console.log('[WS] received:', event, JSON.stringify(payload));
            if (event === 'task:created') {
              console.log('[WS] broadcast OK');
              ws.close();
              process.exit(0);
            }
          });

          setTimeout(() => {
            console.error('[WS] timeout — no broadcast received');
            process.exit(1);
          }, 10000);
          EOF

      - name: Stop services
        if: always()
        run: docker compose down