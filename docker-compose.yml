
version: "3.9"

services:
  service-a:
    build:
      context: ./backend/service-a
      dockerfile: Dockerfile
    container_name: pern-labs-service-a
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://pern:pern@db:5432/pern_labs
      - RESET_TASKS_ON_STARTUP=true
    networks:
      - pern-labs-net
    depends_on:
      - db

  service-b:
    build:
      context: ./backend/service-b
      dockerfile: Dockerfile
    container_name: pern-labs-service-b
    environment:
      - SERVICE_A_URL=http://service-a:3000
      - MAIL_HOST=greenmail
      - MAIL_SMTP_PORT=3025
      - MAIL_IMAP_PORT=3143
      - MAIL_POP3_PORT=3110
      - MAIL_USER=to@localhost
      - MAIL_PASS=to@localhost
      - MAIL_FROM=to@localhost
    ports:
      - "4000:4000"
    depends_on:
      - service-a
      - greenmail
    networks:
      - pern-labs-net

  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: pern-labs-postgres
    environment:
      - POSTGRES_DB=pern_labs
      - POSTGRES_USER=pern
      - POSTGRES_PASSWORD=pern
    ports:
      - "5432:5432"
    volumes:
      - pern-labs-postgres-data:/var/lib/postgresql/data
    networks:
      - pern-labs-net

  greenmail:
    image: greenmail/standalone:2.1.8
    container_name: pern-labs-greenmail
    environment:
      - GREENMAIL_OPTS=-Dgreenmail.setup.test.all -Dgreenmail.hostname=0.0.0.0 -Dgreenmail.users=to@localhost:to@localhost,taskbot@localhost:taskbot@localhost -Dgreenmail.auth.disabled
    ports:
      - "3025:3025" # SMTP
      - "3110:3110" # POP3
      - "3143:3143" # IMAP
      - "8080:8080" # Web UI / API (optional)
    networks:
      - pern-labs-net

  ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pern-labs-ui
    ports:
      - "5173:80"
    depends_on:
      - service-a
    networks:
      - pern-labs-net

networks:
  pern-labs-net:
    driver: bridge

volumes:
  pern-labs-postgres-data:

